name: Build Android SDK Tools (aarch64)

on:
  push:
    branches: [master]
    tags: ['*']
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            cmake ninja-build python3 python3-requests \
            bison flex golang

      - name: Setup Android NDK
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r28c-linux.zip -O /tmp/ndk.zip
          unzip -q /tmp/ndk.zip -d $HOME
          echo "NDK_HOME=$HOME/android-ndk-r28c" >> $GITHUB_ENV

      - name: Clone AOSP sources
        run: python3 get_source.py --tags platform-tools-35.0.2

      - name: Apply protobuf patch and build host protoc
        run: |
          # Apply the protobuf CMakeLists.txt patch (adds android/config.h include path)
          cd src/protobuf
          patch -p0 < ../../patches/protobuf_CMakeLists.txt.patch || true

          cd cmake
          mkdir build-host && cd build-host
          cmake -GNinja \
            -Dprotobuf_BUILD_TESTS=OFF \
            -DCMAKE_CXX_STANDARD=17 \
            ..
          ninja -j$(nproc) protoc
          echo "PROTOC_PATH=$(pwd)/protoc" >> $GITHUB_ENV
          ./protoc --version

      - name: Build (aarch64)
        run: |
          python3 build.py \
            --ndk $NDK_HOME \
            --abi arm64-v8a \
            --api 30 \
            --target aapt2 \
            --protoc $PROTOC_PATH

      - name: Verify binaries
        run: |
          echo "=== Build tools ==="
          for bin in aapt aapt2 aidl zipalign dexdump; do
            printf "%-15s" "$bin:"
            file build/bin/build-tools/$bin 2>/dev/null || echo "MISSING"
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-sdk-tools-aarch64
          path: build/android-sdk-tools-aarch64.zip
          if-no-files-found: error

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/android-sdk-tools-aarch64.zip
