name: Build Android SDK Tools

on:
  push:
    branches: [master]
    tags: ['*']
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 120

    strategy:
      fail-fast: false
      matrix:
        include:
          - abi: arm64-v8a
            arch: aarch64
          - abi: armeabi-v7a
            arch: arm
          - abi: x86_64
            arch: x86_64
          - abi: x86
            arch: i686

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            cmake ninja-build python3 python3-requests \
            bison flex golang

      - name: Setup Android NDK
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r28c-linux.zip -O /tmp/ndk.zip
          unzip -q /tmp/ndk.zip -d $HOME
          echo "NDK_HOME=$HOME/android-ndk-r28c" >> $GITHUB_ENV

      - name: Clone AOSP sources
        run: python3 get_source.py --tags platform-tools-35.0.2

      - name: Apply patches
        run: |
          patch -p1 < patches/protobuf_CMakeLists.txt.patch || true

          # Fix NDK r28c compatibility: ACgroupController_getMaxActivationDepth
          # is marked as Android 36+ in NDK r28c headers, but the AOSP source
          # from platform-tools-35.0.2 calls it unconditionally.
          sed -i 's/max_activation_depth = ACgroupController_getMaxActivationDepth(controller);/\n#if __ANDROID_API__ >= 36\n                max_activation_depth = ACgroupController_getMaxActivationDepth(controller);\n#endif/' \
            src/core/libprocessgroup/cgroup_map.cpp

      - name: Build host protoc
        run: |
          cd src/protobuf/cmake
          mkdir build-host && cd build-host
          cmake -GNinja \
            -Dprotobuf_BUILD_TESTS=OFF \
            -DCMAKE_CXX_STANDARD=17 \
            ..
          ninja -j$(nproc) protoc
          echo "PROTOC_PATH=$(pwd)/protoc" >> $GITHUB_ENV
          ./protoc --version

      - name: Configure
        run: |
          cmake -GNinja -B build \
            -DANDROID_NDK=$NDK_HOME \
            -DCMAKE_TOOLCHAIN_FILE=$NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_PLATFORM=android-30 \
            -DCMAKE_ANDROID_ARCH_ABI=${{ matrix.abi }} \
            -DANDROID_ABI=${{ matrix.abi }} \
            -DCMAKE_SYSTEM_NAME=Android \
            -Dprotobuf_BUILD_TESTS=OFF \
            -DABSL_PROPAGATE_CXX_STD=ON \
            -DANDROID_ARM_NEON=ON \
            -DCMAKE_BUILD_TYPE=Release \
            -DPROTOC_PATH=$PROTOC_PATH

      - name: Build build-tools (${{ matrix.arch }})
        run: ninja -C build -j$(nproc) aapt aapt2 aidl zipalign dexdump split-select

      - name: Strip and package
        run: |
          STRIP=$NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip
          mkdir -p build/bin/build-tools
          for bin in aapt aapt2 aidl zipalign dexdump split-select; do
            if [ -f "build/bin/$bin" ]; then
              cp "build/bin/$bin" "build/bin/build-tools/"
              $STRIP -g "build/bin/build-tools/$bin"
            fi
          done
          echo "=== Build tools ==="
          ls -la build/bin/build-tools/
          file build/bin/build-tools/*
          cd build/bin && zip -r ../android-sdk-tools-${{ matrix.arch }}.zip build-tools/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-sdk-tools-static-${{ matrix.arch }}
          path: build/android-sdk-tools-${{ matrix.arch }}.zip

  release:
    needs: build
    runs-on: ubuntu-24.04
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect zips
        run: |
          mkdir -p release
          find artifacts -name '*.zip' -exec cp {} release/ \;
          ls -la release/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.zip
