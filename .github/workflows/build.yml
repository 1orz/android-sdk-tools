name: Build Android SDK Tools

on:
  push:
    branches: [master]
    tags: ['*']
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 120

    strategy:
      fail-fast: false
      matrix:
        include:
          - abi: arm64-v8a
            arch: aarch64
          - abi: armeabi-v7a
            arch: arm
          - abi: x86_64
            arch: x86_64
          - abi: x86
            arch: i686

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            cmake ninja-build python3 python3-requests \
            bison flex golang

      - name: Setup Android NDK
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r28c-linux.zip -O /tmp/ndk.zip
          unzip -q /tmp/ndk.zip -d $HOME
          echo "NDK_HOME=$HOME/android-ndk-r28c" >> $GITHUB_ENV

      - name: Clone AOSP sources
        run: python3 get_source.py --tags platform-tools-35.0.2

      - name: Apply protobuf patch and build host protoc
        run: |
          patch -p1 < patches/protobuf_CMakeLists.txt.patch || true

          cd src/protobuf/cmake
          mkdir build-host && cd build-host
          cmake -GNinja \
            -Dprotobuf_BUILD_TESTS=OFF \
            -DCMAKE_CXX_STANDARD=17 \
            ..
          ninja -j$(nproc) protoc
          echo "PROTOC_PATH=$(pwd)/protoc" >> $GITHUB_ENV
          ./protoc --version

      - name: Build (${{ matrix.arch }})
        run: |
          python3 build.py \
            --ndk $NDK_HOME \
            --abi ${{ matrix.abi }} \
            --api 35 \
            --protoc $PROTOC_PATH

      - name: Verify binaries
        run: |
          echo "=== Build tools ==="
          for bin in aapt aapt2 aidl zipalign dexdump split-select; do
            printf "%-15s" "$bin:"
            file build/bin/build-tools/$bin 2>/dev/null || echo "MISSING"
          done
          echo ""
          echo "=== Platform tools ==="
          for bin in adb fastboot sqlite3 etc1tool hprof-conv e2fsdroid mke2fs make_f2fs; do
            printf "%-15s" "$bin:"
            file build/bin/platform-tools/$bin 2>/dev/null || echo "MISSING"
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-sdk-tools-static-${{ matrix.arch }}
          path: build/android-sdk-tools-${{ matrix.arch }}.zip

  release:
    needs: build
    runs-on: ubuntu-24.04
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect zips
        run: |
          mkdir -p release
          find artifacts -name '*.zip' -exec cp {} release/ \;
          ls -la release/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.zip
